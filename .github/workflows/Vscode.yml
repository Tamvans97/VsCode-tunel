name: VsCodeTunel Development

on:
  workflow_dispatch:

jobs:
  dev:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y \
            git bc bison build-essential curl flex g++-multilib \
            gcc-multilib lib32ncurses5-dev lib32z1-dev \
            libssl-dev python3 unzip zip rsync ccache

      - name: Install VS Code CLI
        run: |
          curl -L https://code.visualstudio.com/sha/download?build=stable\&os=cli-linux-x64 -o vscode_cli.tar.gz
          tar -xzf vscode_cli.tar.gz
          sudo mv code /usr/local/bin/

      - name: Start VS Code Tunnel
        run: |
          code tunnel
